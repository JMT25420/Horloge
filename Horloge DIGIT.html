<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chrono Rallye 7 Segments (SVG réel)</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* Zones */
#clock, #countdown {
    position: absolute;
    display: flex;
    align-items: center;
}

#clock {
    top: 5%;
    right: 3%;
    height: 25vh;
    color: #00ff00;
}

#countdown {
    bottom: 10%;
    right: 5%;
    height: 35vh;
    color: red;
}

/* Digits */
.digit {
    height: 100%;
    aspect-ratio: 0.7;
}

.digit svg {
    width: 100%;
    height: 100%;
}

/* Segments */
.seg {
    fill: #222;
}

.on {
    fill: currentColor;
}

/* Separators */
.separator {
    font-size: 0.5em;
    padding: 0 0.2em;
    display: flex;
    align-items: center;
}

/* Feux */
#lights {
    position: absolute;
    left: 3%;
    top: 20%;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}

.light {
    width: 14vw;
    height: 14vw;
    border-radius: 50%;
    background: #222;
}
</style>
</head>

<body>

<div id="clock"></div>

<div id="lights">
    <div id="red" class="light"></div>
    <div id="orange" class="light"></div>
    <div id="green" class="light"></div>
</div>

<div id="countdown"></div>

/* Separator */
function sep() {
    const d = document.createElement("div");
    d.className = "separator";
    d.innerText = ":";
    return d;
}

/* Render */
function render(id, str) {
    const c = document.getElementById(id);
    c.innerHTML = "";

    [...str].forEach(ch => {
        if (ch === ":") {
            c.appendChild(sep());
        } else {
            c.appendChild(createDigit(Number(ch)));
        }
    });
}

/* Update */
function update() {

    const now = new Date();

    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = now.getSeconds();

    const time = `${h}:${m}:${String(s).padStart(2,'0')}`;

    let cd;
    if (s <= 20) {
        cd = -s;
    } else {
        cd = 60 - s;
    }

    render("clock", time);
    render("countdown", String(Math.abs(cd)).padStart(2,'0'));

    const red = document.getElementById("red");
    const orange = document.getElementById("orange");
    const green = document.getElementById("green");

    red.style.background = "#222";
    orange.style.background = "#222";
    green.style.background = "#222";

    if (s <= 20) {
        green.style.background = "green";
    } else if (s < 55) {
        red.style.background = "red";
    } else {
        orange.style.background = "orange";
    }
}

/* Boucle stable */
function loop() {
    update();
    const delay = 1000 - (Date.now() % 1000);
    setTimeout(loop, delay);
}

loop();
