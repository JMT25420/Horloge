body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* Layout */
#clock {
    position: absolute;
    top: 5%;
    right: 5%;
    display: flex;
    gap: 1vw;
}

#countdown {
    position: absolute;
    bottom: 10%;
    right: 5%;
    display: flex;
    gap: 1vw;
}

.digit svg {
    width: 8vw;
    height: auto;
}

/* états segments */
.on-green { fill: #00ff00 !important; filter: drop-shadow(0 0 6px #00ff00); }
.on-red   { fill: red !important; filter: drop-shadow(0 0 6px red); }
.off      { fill: #111 !important; }

</style>

/* =========================
   MAP SEGMENTS
========================= */

const map = {
  "0": ["a","b","c","d","e","f"],
  "1": ["b","c"],
  "2": ["a","b","g","e","d"],
  "3": ["a","b","g","c","d"],
  "4": ["f","g","b","c"],
  "5": ["a","f","g","c","d"],
  "6": ["a","f","g","e","c","d"],
  "7": ["a","b","c"],
  "8": ["a","b","c","d","e","f","g"],
  "9": ["a","b","c","d","f","g"],
  "-": ["g"]
};

/* =========================
   CREATE DIGIT
========================= */

function createDigit() {
    const div = document.createElement("div");
    div.className = "digit";
    div.innerHTML = svgTemplate;
    return div.firstElementChild;
}

/* =========================
   SET DIGIT
========================= */

function setDigit(svg, value, colorClass) {

    const active = map[value] || [];

    svg.querySelectorAll(".seg").forEach(seg => {

        const name = seg.classList[1];

        seg.classList.remove("on-green", "on-red");
        seg.classList.add("off");

        if (active.includes(name)) {
            seg.classList.remove("off");
            seg.classList.add(colorClass);
        }
    });
}

/* =========================
   BUILD
========================= */

function build(container, count) {
    const arr = [];
    for (let i = 0; i < count; i++) {
        const d = createDigit();
        container.appendChild(d);
        arr.push(d);
    }
    return arr;
}

const clockDigits = build(document.getElementById("clock"), 6);
const countdownDigits = build(document.getElementById("countdown"), 2);

/* =========================
   UPDATE
========================= */

function update() {

    const now = new Date();

    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    const time = h + m + s;

    for (let i = 0; i < 6; i++) {
        setDigit(clockDigits[i], time[i], "on-green");
    }

    let sec = now.getSeconds();
    let cd = (sec <= 20) ? -sec : 60 - sec;

    const cdStr = String(Math.abs(cd)).padStart(2,'0');

    setDigit(countdownDigits[0], cdStr[0], "on-red");
    setDigit(countdownDigits[1], cdStr[1], "on-red");
}

/* =========================
   SYNCHRO SECONDE PLEINE
========================= */

function start() {
    const delay = 1000 - (Date.now() % 1000);

    setTimeout(() => {
        update();
        setInterval(update, 1000);
    }, delay);
}

start();
