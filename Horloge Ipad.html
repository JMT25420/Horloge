<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chrono Rallye NTP</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial Black, Arial, sans-serif;
    overflow: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
}

/* Horloge */
#clock {
    position: absolute;
    top: 5%;
    right: 5%;
    text-align: right;
    font-size: 16vw;
    color: #00ff00;
    font-weight: bold;
}

/* Compte à rebours */
#countdown {
    position: absolute;
    bottom: 10%;
    right: 5%;
    text-align: right;
    font-size: 28vw;
    color: red;
    font-weight: bold;
}

/* Feu */
#lights {
    position: absolute;
    left: 5%;
    top: 20%;
    display: flex;
    flex-direction: column;
    gap: 1vh;
}

.light {
    width: 14vw;
    height: 14vw;
    border-radius: 50%;
    background: #222;
}

</style>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chrono Rallye">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    </head>

<body>

<div id="clock">--:--:--</div>

<div id="lights">
    <div id="red" class="light"></div>
    <div id="orange" class="light"></div>
    <div id="green" class="light"></div>
</div>

<div id="countdown">0</div>

<script>

let timeOffset = 0; // différence serveur - local
let synced = false;

async function syncTime() {
    try {
        const t0 = Date.now();

        const res = await fetch("https://worldtimeapi.org/api/timezone/Europe/Paris");
        const data = await res.json();

        const t1 = Date.now();

        // heure serveur en ms
        const serverTime = new Date(data.utc_datetime).getTime();

        // compensation latence (approx NTP simplifié)
        const localMid = (t0 + t1) / 2;

        timeOffset = serverTime - localMid;
        synced = true;

        console.log("Synchro OK, offset ms:", timeOffset);

    } catch (e) {
        console.log("Synchro impossible, mode offline", e);
        synced = false;
    }
}

function update() {

    const now = new Date(Date.now() + timeOffset);

    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = now.getSeconds();

    document.getElementById("clock").innerText =
        `${h}:${m}:${String(s).padStart(2,'0')}`;

    let cd;
    if (s <= 20) {
        cd = -s;
    } else {
        cd = 60 - s;
    }

    document.getElementById("countdown").innerText = cd;

    const red = document.getElementById("red");
    const orange = document.getElementById("orange");
    const green = document.getElementById("green");

    red.style.background = "#222";
    orange.style.background = "#222";
    green.style.background = "#222";

    if (s <= 20) {
        green.style.background = "green";
    } else if (s < 55) {
        red.style.background = "red";
    } else {
        orange.style.background = "orange";
    }
}

syncTime(); // première synchro
setInterval(syncTime, 10 * 60 * 1000); // resync toutes les 10 min

/* Boucle stable */
function loop() {
    update();
    setTimeout(loop, 1000);
}

loop();

</script>

</body>
</html>
